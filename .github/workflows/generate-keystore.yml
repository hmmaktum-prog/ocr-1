name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate Keystore & Show Base64
    runs-on: ubuntu-22.04

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias pdftoocr \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PDF to DOCX OCR, OU=App, O=OCR, L=Dhaka, S=Dhaka, C=BD" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}"

      - name: Show Base64 Keystore
        run: |
          echo "============================================"
          echo "নিচের BASE64 মান কপি করে GitHub Secret এ"
          echo "KEYSTORE_BASE64 নামে সংরক্ষণ করুন:"
          echo "============================================"
          base64 -w 0 release.keystore
          echo ""
          echo "============================================"
